name: Watch Render API Deploy

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: watch-render-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  watch-render-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Render deploy to appear and finish
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          echo "Esperando a que Render registre el deploy para staging..."
          echo "Commit esperado: $GITHUB_SHA"

          DEPLOY_ID=""
          DEPLOY_STATUS=""
          DEPLOY_COMMIT=""

          for i in {1..60}; do
            RESPONSE=$(curl -sS \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")

            echo "$RESPONSE" > render-deploys.json

            MATCHING_DEPLOY=$(jq -c --arg sha "$GITHUB_SHA" '
              map(select(.deploy.commit.id? == $sha)) | first
            ' render-deploys.json)

            if [ "$MATCHING_DEPLOY" != "null" ] && [ -n "$MATCHING_DEPLOY" ]; then
              DEPLOY_ID=$(echo "$MATCHING_DEPLOY" | jq -r '.deploy.id // empty')
              DEPLOY_STATUS=$(echo "$MATCHING_DEPLOY" | jq -r '.deploy.status // empty')
              DEPLOY_COMMIT=$(echo "$MATCHING_DEPLOY" | jq -r '.deploy.commit.id // empty')

              echo "Deploy encontrado"
              echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV
              echo "DEPLOY_STATUS=$DEPLOY_STATUS" >> $GITHUB_ENV
              echo "DEPLOY_COMMIT=$DEPLOY_COMMIT" >> $GITHUB_ENV
              break
            fi

            echo "Aún no aparece el deploy asociado al commit. Reintentando en 15 segundos..."
            sleep 15
          done

          if [ -z "${DEPLOY_ID:-}" ]; then
            echo "No se encontró un deploy en Render para el commit actual."
            exit 1
          fi

          echo "Vigilando deploy $DEPLOY_ID..."

          for i in {1..80}; do
            DETAIL=$(curl -sS \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID")

            echo "$DETAIL" > render-deploy-detail.json

            DEPLOY_STATUS=$(jq -r '.status // .deploy.status // empty' render-deploy-detail.json)
            echo "Estado actual: $DEPLOY_STATUS"

            echo "DEPLOY_STATUS=$DEPLOY_STATUS" >> $GITHUB_ENV

            case "$DEPLOY_STATUS" in
              live|succeeded)
                echo "Deploy completado con éxito."
                exit 0
                ;;
              build_failed|failed|canceled|update_failed)
                echo "Deploy falló con estado: $DEPLOY_STATUS"
                exit 1
                ;;
              *)
                sleep 15
                ;;
            esac
          done

          echo "Timeout esperando a que Render terminara el deploy."
          exit 1

      - name: Notify Discord Success
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          jq -n \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg commit_sha "$COMMIT_SHA" \
            --arg commit_message "$COMMIT_MESSAGE" \
            --arg run_url "$RUN_URL" \
            --arg deploy_id "${DEPLOY_ID:-desconocido}" \
            --arg deploy_status "${DEPLOY_STATUS:-succeeded}" \
            '{
              "embeds": [
                {
                  "title": "Deploy exitoso en Render",
                  "description": "La API de staging terminó de desplegarse correctamente.",
                  "color": 5763719,
                  "fields": [
                    { "name": "Proyecto", "value": $repo, "inline": true },
                    { "name": "Rama", "value": $branch, "inline": true },
                    { "name": "Autor", "value": $actor, "inline": true },
                    { "name": "Estado", "value": $deploy_status, "inline": true },
                    { "name": "Deploy ID", "value": $deploy_id, "inline": true },
                    { "name": "Commit SHA", "value": $commit_sha, "inline": false },
                    { "name": "Commit", "value": ($commit_message | if . == "" then "Sin mensaje de commit disponible" else . end), "inline": false },
                    { "name": "Workflow", "value": $run_url, "inline": false }
                  ],
                  "footer": {
                    "text": "DevCrafters CI/CD"
                  },
                  "timestamp": (now | todateiso8601)
                }
              ]
            }' > discord-success.json

          curl -H "Content-Type: application/json" \
               -X POST \
               -d @discord-success.json \
               "$DISCORD_WEBHOOK_URL"

      - name: Notify Discord Failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          jq -n \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg commit_sha "$COMMIT_SHA" \
            --arg commit_message "$COMMIT_MESSAGE" \
            --arg run_url "$RUN_URL" \
            --arg deploy_id "${DEPLOY_ID:-desconocido}" \
            --arg deploy_status "${DEPLOY_STATUS:-failed}" \
            '{
              "embeds": [
                {
                  "title": "Deploy fallido en Render",
                  "description": "La API de staging no terminó bien o excedió el tiempo de espera.",
                  "color": 15548997,
                  "fields": [
                    { "name": "Proyecto", "value": $repo, "inline": true },
                    { "name": "Rama", "value": $branch, "inline": true },
                    { "name": "Autor", "value": $actor, "inline": true },
                    { "name": "Estado", "value": $deploy_status, "inline": true },
                    { "name": "Deploy ID", "value": $deploy_id, "inline": true },
                    { "name": "Commit SHA", "value": $commit_sha, "inline": false },
                    { "name": "Commit", "value": ($commit_message | if . == "" then "Sin mensaje de commit disponible" else . end), "inline": false },
                    { "name": "Workflow", "value": $run_url, "inline": false }
                  ],
                  "footer": {
                    "text": "DevCrafters CI/CD"
                  },
                  "timestamp": (now | todateiso8601)
                }
              ]
            }' > discord-failure.json

          curl -H "Content-Type: application/json" \
               -X POST \
               -d @discord-failure.json \
               "$DISCORD_WEBHOOK_URL"
